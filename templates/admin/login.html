{% extends "base.html" %}

{% block title %}Admin Login - FoodShare{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock display-4 text-warning"></i>
                    <h2 class="mt-3">Admin Panel Login</h2>
                </div>
                
                <form method="POST" action="{{ url_for('admin_login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Admin Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-lg fw-bold">
                            <i class="bi bi-door-open"></i> Admin Login
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    New admin? 
                    <a href="{{ url_for('admin_register') }}" class="text-warning fw-bold">Register here</a>
                </p>
                <p class="text-center mt-2">
                    <a href="{{ url_for('index') }}" class="text-muted">Back to Home</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
