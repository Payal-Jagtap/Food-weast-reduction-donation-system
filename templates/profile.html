{% extends "base.html" %}
{% block title %}Profile - FoodShare{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="mb-4">Your Profile</h2>
                <form method="POST" enctype="multipart/form-data">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}"
                             class="rounded-circle" width="150" height="150" alt="Profile">
                        <div class="mt-2">
                            <input type="file" name="profile_pic" accept="image/*">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="profile_phone" name="phone" 
                               value="{{ user.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Organization (if NGO)</label>
                        <input type="text" class="form-control" name="organization" value="{{ user.organization or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address">{{ user.address or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Update Profile</button>
                    <button type="button" class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                        Change Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Phone validation for profile
    function validatePhoneNumber(phone) {
        if (!phone) return true; // Phone is optional
        const cleaned = phone.replace(/[\s\-\.\(\)]/g, '');
        return /^\d{10}$/.test(cleaned);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const phoneInput = document.getElementById('profile_phone');
        if (phoneInput) {
            phoneInput.addEventListener('input', function() {
                const isValid = validatePhoneNumber(this.value);
                if (this.value) {
                    if (isValid) {
                        this.classList.remove('is-invalid');
                        this.classList.add('is-valid');
                    } else {
                        this.classList.remove('is-valid');
                        this.classList.add('is-invalid');
                    }
                } else {
                    this.classList.remove('is-invalid', 'is-valid');
                }
            });

            // Form submission validation
            const form = phoneInput.closest('form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    const phone = phoneInput.value;
                    if (phone && !validatePhoneNumber(phone)) {
                        e.preventDefault();
                        alert('Phone number must be exactly 10 digits');
                        phoneInput.focus();
                    }
                });
            }
        }
    });
</script>

<!-- Change Password Modal -->
<div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{{ url_for('change_password') }}">
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Old Password</label>
                        <input type="password" class="form-control" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" name="new_password" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning">Change Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
